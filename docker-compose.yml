services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/researchvault
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production-use-a-long-random-string}
      STORAGE_TYPE: local
      UPLOADS_DIR: /data/uploads
      APP_URL: ${APP_URL:-http://localhost:5000}
    volumes:
      - ${UPLOADS_DATA_DIR:-./data/uploads}:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
